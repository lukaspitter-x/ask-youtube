<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="strict-origin-when-cross-origin">
<title>__TITLE__</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=fraunces:400,500,600,700,800,900|ibm-plex-sans:300,400,500,600|ibm-plex-mono:400,500" rel="stylesheet">
<style>
:root {
  --paper: #f4ecd8;
  --paper-soft: #ede1c5;
  --ink: #1a1612;
  --ink-soft: #2a2520;
  --rule: rgba(244, 236, 216, 0.18);
  --accent: #d2691e;
  --accent-soft: #e8915a;
  --quiet: rgba(244, 236, 216, 0.55);
  --display: 'Fraunces', 'Times New Roman', serif;
  --body: 'IBM Plex Sans', system-ui, sans-serif;
  --mono: 'IBM Plex Mono', ui-monospace, 'SF Mono', monospace;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--ink);
  color: var(--paper);
  font-family: var(--body);
  font-weight: 300;
  font-size: 17px;
  line-height: 1.62;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

::selection { background: var(--accent); color: var(--ink); }

a { color: var(--accent-soft); text-decoration: none; border-bottom: 1px solid currentColor; }
a:hover { color: var(--paper); border-bottom-color: var(--accent); }

.layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
  max-width: 1480px;
  margin: 0 auto;
  padding: 0;
  min-height: 100vh;
}

@media (min-width: 1100px) {
  .layout {
    grid-template-columns: minmax(360px, 480px) minmax(0, 1fr);
    gap: 64px;
    padding: 0 64px;
  }
}

/* Left rail — sticky video + answer */
.rail {
  position: relative;
  padding: 24px 16px 32px;
  border-right: none;
  background: var(--ink);
}

@media (min-width: 1100px) {
  .rail {
    position: sticky;
    top: 0;
    align-self: start;
    height: 100vh;
    overflow-y: auto;
    padding: 32px 0 32px;
    border-right: 1px solid var(--rule);
    padding-right: 48px;
  }
}

.rail-meta {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.16em;
  color: var(--quiet);
  margin: 0 0 14px;
}

.rail-meta .dot { color: var(--accent); margin: 0 8px; }

.video-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 9;
  background: #000;
  border-radius: 4px;
  overflow: hidden;
  margin: 0 0 28px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.45);
}

.video-wrap iframe {
  position: absolute; inset: 0; width: 100%; height: 100%; border: 0;
}

.title {
  font-family: var(--display);
  font-weight: 600;
  font-style: italic;
  font-size: clamp(22px, 2.4vw, 32px);
  line-height: 1.12;
  letter-spacing: -0.01em;
  margin: 0 0 18px;
  color: var(--paper);
}

.channel {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--quiet);
  margin: 0 0 28px;
}

.answer-block {
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  padding: 22px 0 24px;
  margin: 8px 0 24px;
}

.answer-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 10px;
}

.answer-text {
  font-family: var(--display);
  font-weight: 500;
  font-size: clamp(20px, 2vw, 26px);
  line-height: 1.32;
  letter-spacing: -0.01em;
  margin: 0;
  color: var(--paper);
}

.intent-block {
  margin: 18px 0 0;
}

.intent-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--quiet);
  margin: 0 0 8px;
}

.intent-text {
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.5;
  font-style: italic;
  color: var(--quiet);
  margin: 0;
  border-left: 2px solid var(--accent);
  padding-left: 14px;
}

/* Body — long-form analysis */
.body {
  padding: 32px 16px 96px;
  max-width: 760px;
}

@media (min-width: 1100px) {
  .body { padding: 64px 0 120px; }
}

.body h1 {
  display: none;
}

.body h2 {
  font-family: var(--display);
  font-weight: 700;
  font-size: clamp(28px, 3vw, 40px);
  line-height: 1.05;
  letter-spacing: -0.02em;
  margin: 56px 0 24px;
  color: var(--paper);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 18px;
}

.body h2:first-child { margin-top: 0; }

.body h3 {
  font-family: var(--display);
  font-weight: 600;
  font-style: italic;
  font-size: clamp(22px, 2.2vw, 28px);
  line-height: 1.18;
  letter-spacing: -0.01em;
  margin: 48px 0 16px;
  color: var(--paper);
}

.body h3 + p > a + br + a,
.body h3 + p {
  margin-top: 8px;
}

.body p {
  margin: 0 0 1.05em;
}

.body strong { font-weight: 600; color: var(--paper); }
.body em { color: var(--accent-soft); font-style: italic; }

.body code {
  font-family: var(--mono);
  font-size: 0.92em;
  background: var(--ink-soft);
  padding: 2px 6px;
  border-radius: 3px;
  color: var(--accent-soft);
}

.body pre {
  background: var(--ink-soft);
  padding: 18px;
  border-radius: 4px;
  border-left: 3px solid var(--accent);
  overflow-x: auto;
  font-size: 14px;
  line-height: 1.5;
}

.body pre code { background: none; padding: 0; color: var(--paper); }

.body blockquote {
  border-left: 3px solid var(--accent);
  padding: 4px 0 4px 22px;
  margin: 28px 0;
  font-family: var(--display);
  font-style: italic;
  font-size: 22px;
  color: var(--paper);
}

.body hr {
  border: 0;
  height: 1px;
  background: var(--rule);
  margin: 56px auto;
  max-width: 60%;
}

.body ul, .body ol { padding-left: 22px; }
.body li { margin-bottom: 6px; }

/* Frame images — full-bleed, clickable */
.body img,
.body p > img {
  display: block;
  width: 100%;
  max-width: 100%;
  margin: 28px 0;
  border-radius: 4px;
  cursor: pointer;
  transition: transform 0.18s ease, box-shadow 0.18s ease;
  box-shadow: 0 12px 32px rgba(0,0,0,0.4);
}

.body img:hover {
  transform: translateY(-2px);
  box-shadow: 0 16px 40px rgba(0,0,0,0.55);
}

.body img.frame-img::after {
  content: attr(data-t-display);
}

/* Timestamp links — monospace chips */
.body a.ts-link {
  display: inline-block;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.02em;
  background: var(--accent);
  color: var(--ink);
  padding: 3px 9px;
  border-radius: 3px;
  border-bottom: 0;
  margin: 0 2px;
  cursor: pointer;
  transition: background 0.12s ease;
}

.body a.ts-link:hover {
  background: var(--accent-soft);
  color: var(--ink);
}

.body a.ts-link::before {
  content: '▶ ';
  font-size: 9px;
  position: relative;
  top: -1px;
}

/* Footer */
.footer {
  grid-column: 1 / -1;
  padding: 32px 16px;
  border-top: 1px solid var(--rule);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--quiet);
  text-align: center;
  margin-top: 64px;
}

@media (min-width: 1100px) {
  .footer { padding: 32px 0; }
}

.footer .sep { margin: 0 12px; color: var(--accent); }

/* Floating "now playing" indicator */
.now-playing {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--ink-soft);
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 8px 14px;
  border-radius: 3px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 100;
}

.now-playing.visible { opacity: 1; }
</style>
</head>
<body>
<div class="layout">
  <aside class="rail">
    <p class="rail-meta">__CHANNEL_META__</p>
    <div class="video-wrap">
      <div id="player"></div>
    </div>
    <h1 class="title">__VIDEO_TITLE__</h1>
    <p class="channel">__CHANNEL__ <span class="dot">·</span> __DURATION__ <span class="dot">·</span> __VIEWS__</p>

    <div class="answer-block">
      <p class="answer-label">The answer</p>
      <p class="answer-text">__ANSWER__</p>
    </div>

    <div class="intent-block">
      <p class="intent-label">Asked</p>
      <p class="intent-text">__INTENT__</p>
    </div>
  </aside>

  <main class="body">
__BODY__
  </main>

  <footer class="footer">
    Generated <span class="sep">·</span> __GENERATED_AT__ <span class="sep">·</span> ask-youtube
  </footer>
</div>

<div id="now-playing" class="now-playing"></div>

<script>
const VIDEO_ID = "__VIDEO_ID__";
let player;
let playerReady = false;

const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

function onYouTubeIframeAPIReady() {
  player = new YT.Player('player', {
    videoId: VIDEO_ID,
    playerVars: { rel: 0, modestbranding: 1, playsinline: 1 },
    events: { onReady: () => { playerReady = true; } }
  });
}

function seekTo(seconds) {
  if (!playerReady) return;
  player.seekTo(seconds, true);
  player.playVideo();
  if (window.innerWidth < 1100) {
    document.querySelector('.video-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  showNowPlaying(seconds);
}

function showNowPlaying(seconds) {
  const m = Math.floor(seconds / 60);
  const s = String(seconds % 60).padStart(2, '0');
  const np = document.getElementById('now-playing');
  np.textContent = `▶ Jumped to ${m}:${s}`;
  np.classList.add('visible');
  clearTimeout(showNowPlaying._t);
  showNowPlaying._t = setTimeout(() => np.classList.remove('visible'), 1800);
}

document.addEventListener('DOMContentLoaded', () => {
  // Rewrite YouTube timestamp links → seek the embedded player
  const timestampPattern = /[?&]t=(\d+)s?(?:&|$)/;
  document.querySelectorAll('.body a').forEach((a) => {
    const href = a.getAttribute('href') || '';
    const m = href.match(timestampPattern);
    if (m && (href.includes('youtube.com') || href.includes('youtu.be'))) {
      const t = parseInt(m[1], 10);
      a.classList.add('ts-link');
      a.setAttribute('data-t', t);
      // Use textContent if it's the long YouTube link; otherwise keep label
      if (a.textContent.toLowerCase().includes('watch from')) {
        const mins = Math.floor(t / 60);
        const secs = String(t % 60).padStart(2, '0');
        a.textContent = `${mins}:${secs}`;
      }
      a.removeAttribute('target');
      a.addEventListener('click', (e) => {
        e.preventDefault();
        seekTo(t);
      });
    }
  });

  // Make frame images clickable — seek to the timestamp parsed from filename
  const framePattern = /(?:_|\/)(?:(\d+)h)?(\d+)m(\d+)s\.jpg$/i;
  document.querySelectorAll('.body img').forEach((img) => {
    const src = img.getAttribute('src') || '';
    const m = src.match(framePattern);
    if (!m) return;
    const h = m[1] ? parseInt(m[1], 10) : 0;
    const mm = parseInt(m[2], 10);
    const ss = parseInt(m[3], 10);
    const t = h * 3600 + mm * 60 + ss;
    img.classList.add('frame-img');
    img.setAttribute('data-t', t);
    img.title = `Jump to ${mm}:${String(ss).padStart(2, '0')}`;
    img.addEventListener('click', () => seekTo(Math.max(0, t - 2)));
  });
});
</script>
</body>
</html>
